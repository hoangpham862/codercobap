name: shared
description: "A new Flutter package project."
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.5.4
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  flex_color_scheme: 8.4.0
  theme_provider: ^0.6.0
  easy_localization: ^3.0.8
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  easy_localization_loader: ^2.0.2
  flutter_svg: ^2.3.0

  # packages
  resources:
    path: ../resources
  navigation:
    path: ../navigation

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

